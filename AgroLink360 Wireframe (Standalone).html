document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Patrick Hand';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"d62d1b85-e90a-4435-bfed-1ffb6a2342e0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n*{box-sizing:border-box}\nhtml,body{margin:0;padding:0}\nbody{font-family:'Patrick Hand',system-ui,sans-serif;background:#f4f2ec;color:#1a1a1a}\n.app{height:100vh;height:100dvh;display:flex;flex-direction:column}\n.top{height:56px;flex:none;display:flex;align-items:center;gap:12px;padding:0 14px;background:#fff;border-bottom:2px solid #1a1a1a}\n.logo{font-size:19px;white-space:nowrap}\n.wftag{font-family:'Architects Daughter',cursive;font-size:11px;border:1.5px dashed #b05c2a;color:#b05c2a;border-radius:6px;padding:1px 8px;transform:rotate(-3deg);white-space:nowrap}\n.rtabs{display:flex;gap:3px;border:2px solid #1a1a1a;border-radius:11px;padding:3px;overflow-x:auto;scrollbar-width:none}\n.rtab{padding:4px 13px;border-radius:8px;font-size:14px;color:#777;cursor:pointer;border:none;background:none;font-family:inherit;white-space:nowrap}\n.rtab.on{background:#1a1a1a;color:#fff}\n.body{flex:1;display:flex;min-height:0}\n.side{width:180px;flex:none;border-right:2px solid #1a1a1a;background:#fff;padding:12px 10px;display:flex;flex-direction:column;gap:5px}\n.sitem{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;font-size:15px;color:#777;cursor:pointer;border:none;background:none;font-family:inherit;text-align:left;width:100%}\n.sitem.on{background:#1a1a1a;color:#fff}\n.main{flex:1;overflow-y:auto;padding:20px 22px 34px;display:flex;flex-direction:column;gap:12px}\n.page{display:flex;flex-direction:column;gap:12px;max-width:980px}\n.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #1a1a1a;padding:6px 4px 10px;z-index:30}\n.bitem{flex:1;text-align:center;font-size:12px;color:#777;background:none;border:none;font-family:inherit;cursor:pointer;padding:2px 0;border-radius:8px}\n.bitem.on{color:#1a1a1a;font-weight:bold}\n.navic{display:block;width:20px;height:15px;border:2px solid currentColor;border-radius:5px;margin:0 auto 2px}\n.tap{cursor:pointer}\n.tap:hover{outline:2.5px solid #2f9e57;outline-offset:2px;border-radius:10px}\n.h1{font-size:23px;line-height:1.1}\n.small{font-size:13px;color:#777}\n.row{display:flex;gap:10px;align-items:center}\n.grow{flex:1;min-width:0}\n.box{border:1.5px dashed #999;border-radius:10px;padding:10px 12px;background:#fff}\n.solid{border:2px solid #1a1a1a;border-radius:12px;padding:11px 13px;background:#fff}\n.btn{border:2px solid #1a1a1a;border-radius:10px;text-align:center;padding:8px 16px;font-size:15px;background:#fff;font-family:inherit;cursor:pointer;color:#1a1a1a}\n.btn.primary{background:#1a1a1a;color:#fff}\n.btn.accent{background:#2f9e57;border-color:#2f9e57;color:#fff}\n.imgph{border:1.5px dashed #999;border-radius:10px;position:relative;background:#fff linear-gradient(to top right,transparent calc(50% - 1px),#ddd,transparent calc(50% + 1px)),linear-gradient(to bottom right,transparent calc(50% - 1px),#ddd,transparent calc(50% + 1px))}\n.phlabel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12.5px;color:#999;text-align:center;padding:6px}\n.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}\n.kpi{border:1.5px dashed #999;border-radius:10px;padding:9px 11px;text-align:center;background:#fff;font-family:inherit;cursor:pointer}\n.kpi b{display:block;font-size:20px}\n.kpi span{font-size:12px;color:#888}\n.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:13px}\n.cols{display:flex;gap:12px;flex-wrap:wrap}\n.chips{display:flex;gap:7px;flex-wrap:wrap}\n.chip{border:1.5px solid #1a1a1a;border-radius:20px;padding:2px 13px;font-size:14px;background:#fff;font-family:inherit;cursor:pointer;color:#1a1a1a}\n.chip.on{background:#1a1a1a;color:#fff}\n.bar{height:9px;border-radius:6px;background:#eceae2;overflow:hidden}\n.bar i{display:block;height:100%;border-radius:6px;background:#2f9e57}\n.minibars{display:flex;align-items:flex-end;gap:9px;height:90px;padding-top:6px}\n.minibars i{flex:1;background:#e4e2da;border-radius:5px 5px 0 0}\n.minibars i.hi{background:#2f9e57}\n.trow{display:flex;gap:10px;align-items:center;border-top:1.5px dashed #ccc;padding:9px 2px;font-size:14px;background:none;border-left:none;border-right:none;border-bottom:none;font-family:inherit;text-align:left;width:100%;cursor:pointer}\n.tag{font-size:12px;border:1.5px solid #1a1a1a;border-radius:20px;padding:1px 9px;white-space:nowrap}\n.tag.ok{border-color:#2f9e57;color:#2f9e57}\n.tag.warn{border-color:#b05c2a;color:#b05c2a}\n.steprow{display:flex;gap:10px;align-items:flex-start;font-size:14.5px;padding:3px 0}\n.dot{width:11px;height:11px;border-radius:50%;background:#2f9e57;flex:none;margin-top:5px}\n.dot.o{background:#fff;border:1.5px solid #999}\n.note{font-family:'Architects Daughter',cursive;font-size:12.5px;color:#b05c2a}\n.input{border:1.5px solid #999;border-radius:10px;padding:9px 11px;color:#aaa;font-size:14.5px;background:#fff}\n.ovl{position:fixed;inset:0;background:rgba(26,26,26,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}\n.sheet{background:#fff;border:2px solid #1a1a1a;border-radius:16px;width:400px;max-width:100%;padding:18px 16px;display:flex;flex-direction:column;gap:10px;box-shadow:4px 4px 0 rgba(0,0,0,.2)}\n.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:12px;font-size:15px;z-index:60;max-width:90vw;text-align:center}\n.stars{font-size:30px;letter-spacing:6px;text-align:center;cursor:pointer;user-select:none}\n.land{background:#f4f2ec}\n.lnav{display:flex;gap:14px;align-items:center}\n.lnav a{color:#777;text-decoration:none;font-size:15px;padding:2px 7px;border-radius:8px}\n.lnav a:hover{outline:2px solid #2f9e57;color:#1a1a1a}\n.lhero{display:flex;gap:30px;padding:44px 6vw 36px;align-items:center;flex-wrap:wrap}\n.lh1{font-size:44px;line-height:1.04;margin:0;font-weight:normal}\n.lsub{font-size:17px;color:#666;max-width:470px}\n.lsec{padding:30px 6vw;display:flex;flex-direction:column;gap:14px}\n.lsec h2{font-size:26px;margin:0;font-weight:normal}\n.lgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(205px,1fr));gap:13px}\n.stepnum{width:32px;height:32px;border:2px solid #1a1a1a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex:none}\n.lfoot{border-top:2px solid #1a1a1a;padding:20px 6vw;display:flex;gap:12px;flex-wrap:wrap;align-items:center;background:#fff}\n.authwrap{min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:18px;background:#f4f2ec}\ninput.input{color:#1a1a1a;font-family:inherit;width:100%;outline:none}\ninput.input:focus{border-color:#2f9e57}\n.statrow{display:flex;gap:24px;flex-wrap:wrap}\n.stat b{font-size:22px;display:block}\n@media(max-width:820px){\n  .side{display:none}\n  .bnav{display:flex}\n  .main{padding:14px 14px 92px}\n  .hide-m{display:none}\n  .top{gap:8px;padding:0 10px}\n  .lh1{font-size:31px}\n  .lnav{display:none}\n  .lhero{padding:30px 5vw 26px}\n  .lsec{padding:24px 5vw}\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div>\n\n<!-- ═══════════ LANDING PAGE ═══════════ -->\n<sc-if value=\"{{ showLanding }}\" hint-placeholder-val=\"{{ true }}\">\n  <div class=\"land\" data-screen-label=\"Landing page\">\n    <header class=\"top\" style=\"position:sticky;top:0;z-index:20\">\n      <div class=\"row\" style=\"gap:8px\">\n        <div style=\"width:30px;height:30px;border:2px solid #1a1a1a;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none\">🌱<\u002Fdiv>\n        <span class=\"logo\">AgroLink<b style=\"color:#2f9e57\">360<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n      <span class=\"wftag hide-m\">wireframe v2<\u002Fspan>\n      <div class=\"grow\"><\u002Fdiv>\n      <nav class=\"lnav\"><a href=\"#lp-how\">How it works<\u002Fa><a href=\"#lp-roles\">Who it's for<\u002Fa><a href=\"#lp-ai\">AI engine<\u002Fa><\u002Fnav>\n      <button class=\"btn\" onclick=\"{{ goLogin }}\">Log in<\u002Fbutton>\n      <button class=\"btn accent\" onclick=\"{{ goSignup }}\">Get started<\u002Fbutton>\n    <\u002Fheader>\n\n    <div class=\"lhero\">\n      <div style=\"flex:1.1;min-width:280px;display:flex;flex-direction:column;gap:14px\">\n        <span class=\"tag warn\" style=\"align-self:flex-start\">GDSS-PSInno Agritech Challenge · Ashanti Region pilot<\u002Fspan>\n        <h1 class=\"lh1\">From farm gate to buyer's door — <span style=\"color:#2f9e57\">one tap<\u002Fspan>.<\u002Fh1>\n        <div class=\"lsub\">AgroLink360 connects smallholder vegetable farmers directly to buyers, with AI-matched transport, live delivery tracking and instant mobile-money payment. Less spoilage. Fairer prices.<\u002Fdiv>\n        <div class=\"row\" style=\"flex-wrap:wrap\">\n          <button class=\"btn accent\" style=\"font-size:17px;padding:10px 22px\" onclick=\"{{ goSignup }}\">Get started free →<\u002Fbutton>\n          <a class=\"btn\" style=\"font-size:17px;padding:10px 22px;text-decoration:none\" href=\"#lp-how\">See how it works<\u002Fa>\n        <\u002Fdiv>\n        <div class=\"statrow\">\n          <div class=\"stat\"><b>1,284<\u002Fb><span class=\"small\">farmers onboard<\u002Fspan><\u002Fdiv>\n          <div class=\"stat\"><b>GH₵ 212k<\u002Fb><span class=\"small\">traded in June<\u002Fspan><\u002Fdiv>\n          <div class=\"stat\"><b>−31%<\u002Fb><span class=\"small\">post-harvest losses<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"imgph\" style=\"flex:1;min-width:260px;height:280px\"><span class=\"phlabel\">hero image — farmer with phone<br>+ marketplace screenshot<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"lsec\" id=\"lp-how\" style=\"background:#fff;border-top:2px solid #1a1a1a;border-bottom:2px solid #1a1a1a\">\n      <h2>How it works<\u002Fh2>\n      <div class=\"lgrid\">\n        <div class=\"solid\"><div class=\"row\"><span class=\"stepnum\">1<\u002Fspan><b>List produce<\u002Fb><\u002Fdiv><div class=\"small\" style=\"margin-top:6px\">Farmer uploads crop, quantity &amp; price — in the app, or by USSD <b style=\"color:#1a1a1a\">*920*36#<\u002Fb> with no internet.<\u002Fdiv><\u002Fdiv>\n        <div class=\"solid\"><div class=\"row\"><span class=\"stepnum\">2<\u002Fspan><b>AI matches<\u002Fb><\u002Fdiv><div class=\"small\" style=\"margin-top:6px\">The engine finds nearby buyers, predicts the best price and books shared transport.<\u002Fdiv><\u002Fdiv>\n        <div class=\"solid\"><div class=\"row\"><span class=\"stepnum\">3<\u002Fspan><b>Track delivery<\u002Fb><\u002Fdiv><div class=\"small\" style=\"margin-top:6px\">Live GPS from farm gate to buyer's door, with SMS updates for both sides.<\u002Fdiv><\u002Fdiv>\n        <div class=\"solid\"><div class=\"row\"><span class=\"stepnum\">4<\u002Fspan><b>Get paid<\u002Fb><\u002Fdiv><div class=\"small\" style=\"margin-top:6px\">MoMo escrow releases instantly on confirmed delivery. No middlemen.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"lsec\" id=\"lp-roles\">\n      <h2>Built for the whole value chain<\u002Fh2>\n      <div class=\"lgrid\">\n        <div class=\"solid\" style=\"display:flex;flex-direction:column;gap:8px\">\n          <div class=\"imgph\" style=\"height:58px\"><span class=\"phlabel\">farmer photo<\u002Fspan><\u002Fdiv>\n          <b style=\"font-size:17px\">Farmers<\u002Fb>\n          <div class=\"small\">Sell direct at fair prices, request transport, get AI harvest &amp; price advice.<\u002Fdiv>\n          <button class=\"btn accent\" style=\"margin-top:auto\" onclick=\"{{ joinFarmer }}\">Join as farmer<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"solid\" style=\"display:flex;flex-direction:column;gap:8px\">\n          <div class=\"imgph\" style=\"height:58px\"><span class=\"phlabel\">buyer photo<\u002Fspan><\u002Fdiv>\n          <b style=\"font-size:17px\">Buyers<\u002Fb>\n          <div class=\"small\">Restaurants, hotels &amp; markets: source fresh, verified produce with delivery tracking.<\u002Fdiv>\n          <button class=\"btn accent\" style=\"margin-top:auto\" onclick=\"{{ joinBuyer }}\">Join as buyer<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"solid\" style=\"display:flex;flex-direction:column;gap:8px\">\n          <div class=\"imgph\" style=\"height:58px\"><span class=\"phlabel\">transporter photo<\u002Fspan><\u002Fdiv>\n          <b style=\"font-size:17px\">Transporters<\u002Fb>\n          <div class=\"small\">Steady delivery requests, AI-consolidated routes, better vehicle utilisation.<\u002Fdiv>\n          <button class=\"btn accent\" style=\"margin-top:auto\" onclick=\"{{ joinTransport }}\">Join as transporter<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"lsec\" id=\"lp-ai\" style=\"background:#fff;border-top:2px solid #1a1a1a;border-bottom:2px solid #1a1a1a\">\n      <h2>The AI engine under the hood<\u002Fh2>\n      <div class=\"lgrid\">\n        <div class=\"box\"><b>Price prediction<\u002Fb><div class=\"small\" style=\"margin-top:4px\">Knows what your tomatoes will fetch next week — sell in the right window.<\u002Fdiv><\u002Fdiv>\n        <div class=\"box\"><b>Demand forecasting<\u002Fb><div class=\"small\" style=\"margin-top:4px\">Anticipates what buyers need, before they search for it.<\u002Fdiv><\u002Fdiv>\n        <div class=\"box\"><b>Spoilage-risk alerts<\u002Fb><div class=\"small\" style=\"margin-top:4px\">Perishables get delivery priority automatically.<\u002Fdiv><\u002Fdiv>\n        <div class=\"box\"><b>Shared routes<\u002Fb><div class=\"small\" style=\"margin-top:4px\">Combines nearby pickups into one trip — cheaper for everyone.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"lsec\">\n      <div class=\"solid\" style=\"background:#1a1a1a;color:#fff;display:flex;gap:14px;align-items:center;flex-wrap:wrap\">\n        <div class=\"grow\" style=\"min-width:220px\"><b style=\"font-size:19px\">No smartphone? No internet? No problem.<\u002Fb><div class=\"small\" style=\"color:#aaa\">Full ordering by USSD &amp; SMS · Twi, Dagbani, Hausa &amp; English<\u002Fdiv><\u002Fdiv>\n        <span style=\"font-size:24px;border:2px dashed #666;border-radius:10px;padding:6px 16px\">*920*36#<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <footer class=\"lfoot\" style=\"flex-direction:column;align-items:stretch;gap:14px\">\n      <div class=\"row\" style=\"flex-wrap:wrap;gap:20px;align-items:flex-start\">\n        <div style=\"min-width:200px;flex:1\">\n          <span class=\"logo\" style=\"font-size:17px\">AgroLink<b style=\"color:#2f9e57\">360<\u002Fb><\u002Fspan>\n          <div class=\"small\" style=\"margin-top:4px;max-width:300px\">AI-powered farmer-to-buyer marketplace and smart logistics for Ghana's vegetable value chain.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"min-width:130px\"><b style=\"font-size:14px\">Platform<\u002Fb><div class=\"lnav\" style=\"flex-direction:column;align-items:flex-start;gap:3px;margin-top:5px;display:flex\"><a href=\"#lp-how\">How it works<\u002Fa><a href=\"#lp-roles\">Who it's for<\u002Fa><a href=\"#lp-ai\">AI engine<\u002Fa><\u002Fdiv><\u002Fdiv>\n        <div style=\"min-width:130px\"><b style=\"font-size:14px\">Contact<\u002Fb><div class=\"small\" style=\"margin-top:5px;line-height:1.6\">Agro AI Nexus<br>Kumasi, Ashanti Region<br>hello@agrolink360.com<\u002Fdiv><\u002Fdiv>\n        <div style=\"min-width:150px\"><b style=\"font-size:14px\">Offline access<\u002Fb><div class=\"small\" style=\"margin-top:5px;line-height:1.6\">USSD <b style=\"color:#1a1a1a\">*920*36#<\u002Fb><br>Twi · Dagbani · Hausa · English<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row small\" style=\"border-top:1.5px dashed #ccc;padding-top:10px;flex-wrap:wrap\">\n        <span>© 2026 Agro AI Nexus · GDSS-PSInno Agritech Innovation Challenge<\u002Fspan>\n        <div class=\"grow\"><\u002Fdiv>\n        <span>Ejisu–Akomadan–Offinso pilot<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Ffooter>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ═══════════ LOGIN ═══════════ -->\n<sc-if value=\"{{ showLogin }}\" hint-placeholder-val=\"\">\n  <div class=\"authwrap\" data-screen-label=\"Login\">\n    <div class=\"sheet\" style=\"width:430px\">\n      <button class=\"btn\" style=\"align-self:flex-start;padding:2px 12px;font-size:13px\" onclick=\"{{ backLanding }}\">← back<\u002Fbutton>\n      <b style=\"font-size:22px\">Welcome back<\u002Fb>\n      <div class=\"small\">Sign in with your phone number — no email needed.<\u002Fdiv>\n      <div class=\"small\" style=\"margin-top:2px\">Log in as:<\u002Fdiv>\n      <div class=\"chips\">\n        <sc-for list=\"{{ loginRoleChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n          <button class=\"{{ c.cls }}\" onclick=\"{{ c.onClick }}\">{{ c.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <input class=\"input\" placeholder=\"+233 · phone number\" value=\"{{ lPhone }}\" onchange=\"{{ onLPhone }}\">\n      <input class=\"input\" type=\"password\" placeholder=\"4-digit PIN\" value=\"{{ lPin }}\" onchange=\"{{ onLPin }}\">\n      <button class=\"btn accent\" onclick=\"{{ doLogin }}\">Continue →<\u002Fbutton>\n      <button class=\"btn\" onclick=\"{{ goSignup }}\">New here? Create an account<\u002Fbutton>\n      <div class=\"box small\">Wireframe demo: any phone + PIN works · real build sends an SMS OTP<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ═══════════ SIGNUP ═══════════ -->\n<sc-if value=\"{{ showSignup }}\" hint-placeholder-val=\"\ ders }}\"><span class=\"grow\"><b>Golden Tulip Hotel<\u002Fb> · Garden eggs · 4 crates<\u002Fspan><b>GH₵ 520<\u002Fb><span class=\"tag\">confirmed<\u002Fspan><\u002Fbutton>\n            <button class=\"trow tap\" onclick=\"{{ goFOrders }}\"><span class=\"grow\"><b>Mama Efua Chop Bar<\u002Fb> · Cabbage · 12 heads<\u002Fspan><b>GH₵ 180<\u002Fb><span class=\"tag warn\">awaiting pickup<\u002Fspan><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ═══ FARMER · MY PRODUCE ═══ -->\n      <sc-if value=\"{{ showProduce }}\" hint-placeholder-val=\"\">\n        <div class=\"page\" data-screen-label=\"My produce\">\n          <div class=\"row\"><div class=\"grow\"><div class=\"h1\">My produce<\u002Fdiv><div class=\"small\">6 listings · freshness scored by AI<\u002Fdiv><\u002Fdiv><button class=\"btn accent\" onclick=\"{{ openListing }}\">+ New listing<\u002Fbutton><\u002Fdiv>\n          <div class=\"cards\">\n            <sc-for list=\"{{ produce }}\" as=\"p\" hint-placeholder-count=\"6\">\n              <button class=\"solid tap\" style=\"text-align:left;font-family:inherit;display:flex;flex-direction:column;gap:6px\" onclick=\"{{ p.onClick }}\">\n                <div class=\"imgph\" style=\"height:64px;width:100%\"><span class=\"phlabel\">{{ p.photoLabel }}<\u002Fspan><\u002Fdiv>\n                <div class=\"row\" style=\"width:100%\"><b class=\"grow\" style=\"font-size:15px\">{{ p.name }}<\u002Fb><b>{{ p.price }}<\u002Fb><\u002Fdiv>\n                <div class=\"small\">{{ p.qty }}<\u002Fdiv>\n                <div class=\"row\" style=\"width:100%\"><div class=\"bar grow\"><i style=\"{{ p.barStyle }}\"><\u002Fi><\u002Fdiv><span class=\"small\">{{ p.fresh }}%<\u002Fspan><\u002Fdiv>\n                <sc-if value=\"{{ p.warn }}\" hint-placeholder-val=\"\"><span class=\"tag warn\">{{ p.warn }}<\u002Fspan><\u002Fsc-if>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div class=\"note\">tap any c s.name + ' — photo gallery', selPrice: s.price, selUnit: s.unit, selFarmer: s.farmer,\n      selLoc: s.loc, selRating: s.rating, selFresh: s.fresh, qty, total,\n      starStr: '★'.repeat(stars) + '☆'.repeat(5 - stars),\n      // modals\n      showListingModal: modal === 'listing',\n      showPayModal: modal === 'pay',\n      showRateModal: modal === 'rate',\n      // handlers\n      goProduce: () => this.setPage('produce'),\n      goFOrders: () => this.setPage('forders'),\n      goWallet: () => this.setPage('wallet'),\n      goFTrack: () => this.setPage('ftrack'),\n      goMarket: () => this.setPage('market'),\n      goProduct: () => this.setState({ sel: this.MARKET[2], page: 'product', qty: 6 }),\n      goTracking: () => this.setPage('tracking'),\n      goRequests: () => this.setPage('requests'),\n      goConsolidate: () => this.setPage('consolidate'),\n      goAdminUsers: () => this.setState({ page: 'adminGeneric', adminSection: 'Users' }),\n      openListing: () => this.setState({ modal: 'listing' }),\n      openPay: () => this.setState({ modal: 'pay' }),\n      openRate: () => this.setState({ modal: 'rate' }),\n      closeModal: () => this.setState({ modal: null }),\n      stop: (e) => e.stopPropagation(),\n      incQty: () => this.setState((st) => ({ qty: st.qty + 1 })),\n      decQty: () => this.setState((st) => ({ qty: Math.max(1, st.qty - 1) })),\n      cycleStars: () => this.setState((st) => ({ stars: (st.stars % 5) + 1 })),\n      publishListing: () => { this.setState({ modal: null, page: 'produce' }); this.flash('Listing published ✓ (wireframe)'); },\n      confirmPay: () => { this.setState({ modal: null, page: 'tracking' }); this.flash('Payment simulated ✓ — order #AL-2381 placed'); },\n      submitRating: () => { this.setState({ modal: null }); this.flash('Rating submitted ✓ — thanks!'); },\n      acceptShared: () => { this.setPage('route'); this.flash('Shared route accepted — GH₵ 70 saved'); },\n      toastWF: () => this.flash('Opens MoMo withdrawal flow (wireframe)'),\n      toastCall: () => this.flash('Calls driver via phone (wireframe)'),\n      toastNav: () => this.flash('Opens turn-by-turn navigation (wireframe)'),\n      markDone: () => this.flash('Stop marked done — buyer gets SMS + push update'),\n      toastTransport: () => this.flash('Sends transport request to nearby drivers'),\n      toastAdmin: () => this.flash('Opens detail view (wireframe)'),\n      // ── auth & landing ──\n      showLanding: view === 'landing',\n      showLogin: view === 'login',\n      showSignup: view === 'signup',\n      showApp: view === 'app',\n      signupStep1: signupStep === 1,\n      signupStep2: signupStep === 2,\n      signupStep3: signupStep === 3,\n      signupRoleLabel: { farmer: 'Farmer', buyer: 'Buyer', transport: 'Transporter' }[signupRole],\n      userName: this.state.userName || this.DEMO_NAMES[role],\n      greeting: 'Akwaaba, ' + ((this.state.userName || this.DEMO_NAMES[role]).split(' ')[0]) + ' 👋',\n      dashSub: (((this.state.fCommunity || '').trim() || 'Ejisu, Ashanti')) + ' · Tue 1 Jul',\n      loginRoleChips: [['farmer', 'Farmer'], ['buyer', 'Buyer'], ['transport', 'Transporter'], ['admin', 'Admin']].map(([id, label]) => ({\n        label,\n        cls: loginRole === id ? 'chip on' : 'chip',\n        onClick: () => this.setState({ loginRole: id }),\n      })),\n      lPhone: this.state.lPhone || '', lPin: this.state.lPin || '',\n      fName: this.state.fName || '', fPhone: this.state.fPhone || '',\n      fCommunity: this.state.fCommunity || '', fPin: this.state.fPin || '', otp: this.state.otp || '',\n      otpHint: 'We sent a 4-digit code by SMS to ' + ((this.state.fPhone || '').trim() || 'your phone'),\n      onLPhone: (e) => this.setState({ lPhone: e.target.value }),\n      onLPin: (e) => this.setState({ lPin: e.target.value }),\n      onFName: (e) => this.setState({ fName: e.target.value }),\n      onFPhone: (e) => this.setState({ fPhone: e.target.value }),\n      onFCommunity: (e) => this.setState({ fCommunity: e.target.value }),\n      onFPin: (e) => this.setState({ fPin: e.target.value }),\n      onOtp: (e) => this.setState({ otp: e.target.value }),\n      goLogin: () => this.setState({ view: 'login' }),\n      goSignup: () => this.setState({ view: 'signup', signupStep: 1 }),\n      backLanding: () => this.setState({ view: 'landing' }),\n      joinFarmer: () => this.setState({ view: 'signup', signupRole: 'farmer', signupStep: 2 }),\n      joinBuyer: () => this.setState({ view: 'signup', signupRole: 'buyer', signupStep: 2 }),\n      joinTransport: () => this.setState({ view: 'signup', signupRole: 'transport', signupStep: 2 }),\n      pickFarmer: () => this.setState({ signupRole: 'farmer', signupStep: 2 }),\n      pickBuyer: () => this.setState({ signupRole: 'buyer', signupStep: 2 }),\n      pickTransport: () => this.setState({ signupRole: 'transport', signupStep: 2 }),\n      signupBack: () => {\n        const st = this.state.signupStep || 1;\n        if (st === 1) this.setState({ view: 'landing' });\n        else this.setState({ signupStep: st - 1 });\n      },\n      doLogin: () => {\n        if (!(this.state.lPhone || '').trim()) return this.flash('Please enter your phone number');\n        if (!(this.state.lPin || '').trim()) return this.flash('Please enter your PIN');\n        const r = this.state.loginRole || 'farmer';\n        this.setState({ view: 'app', role: r, page: this.defaultPage[r === 'admin' ? 'admin' : r], userName: this.DEMO_NAMES[r] });\n        this.flash('Akwaaba, ' + this.DEMO_NAMES[r] + ' ✓');\n      },\n      signupNext: () => {\n        if (!(this.state.fName || '').trim()) return this.flash('Please enter your name');\n        if (!(this.state.fPhone || '').trim()) return this.flash('Please enter your phone number');\n        if (!(this.state.fPin || '').trim()) return this.flash('Please create a PIN');\n        this.setState({ signupStep: 3 });\n      },\n      verifyOtp: () => {\n        if (!(this.state.otp || '').trim()) return this.flash('Enter the code from the SMS');\n        const r = this.state.signupRole || 'farmer';\n        this.setState({ view: 'app', role: r, page: this.defaultPage[r], userName: (this.state.fName || '').trim() || 'New user' });\n        this.flash('Account created ✓ — Akwaaba, ' + ((this.state.fName || '').trim() || 'friend') + '!');\n      },\n      logout: () => { this.setState({ view: 'landing' }); this.flash('Logged out ✓'); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
