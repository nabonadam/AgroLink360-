databases:
  - name: agrolink360-db
    plan: free
    databaseName: agrolink360
    user: agrolink

services:
  - type: web
    name: agrolink360-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrolink360-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: agrolink360-ai
          property: host

  - type: web
    name: agrolink360-ai
    runtime: python
    plan: free
    rootDir: backend/ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
