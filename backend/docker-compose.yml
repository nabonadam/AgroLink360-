services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: agrolink
      POSTGRES_PASSWORD: agrolink
      POSTGRES_DB: agrolink360
    ports:
      - "5432:5432"
    volumes:
      - agrolink_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrolink -d agrolink360"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run migrate && npm run seed && npm run start"
    environment:
      DATABASE_URL: postgres://agrolink:agrolink@db:5432/agrolink360
      JWT_SECRET: dev-secret-change-me
      AI_SERVICE_URL: http://ai:8000
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy

  ai:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app

volumes:
  agrolink_pgdata:
